<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-viewport">
    <div class="views-container" id="views-container">
      
      <!-- VIEW 1: MAIN VIEW -->
      <div class="view-panel" id="view-main">
        <div class="container">
          <!-- Header -->
          <header class="header">
            <div class="header-logo-row">
              <div class="logo-group">
                <img src="icons/icon128.png" width="20" height="20" alt="FocusShield" class="logo-icon-svg">
                <h1 class="logo-title">FocusShield</h1>
              </div>
            </div>
            <p class="header-tagline">Block the noise. Find your focus.</p>
          </header>
 
          <!-- Master Toggle Card -->
          <section class="card master-card">
            <div class="master-info">
              <span class="master-label">Focus Mode</span>
              <span id="master-status" class="status-active">Active</span>
            </div>
            <label class="switch-large">
              <input type="checkbox" id="master-toggle" checked>
              <span class="slider-large"></span>
            </label>
          </section>

          <!-- Current Site Section -->
          <section class="card current-site-card" id="current-site-section" style="display: none;">
            <div class="current-site-info">
              <span class="current-site-label">Current Site</span>
              <div class="current-site-display">
                <img id="current-site-favicon" class="site-favicon" src="" alt="" width="16" height="16">
                <span id="current-site-name" class="site-name"></span>
              </div>
            </div>
            <div id="current-site-action-wrapper">
              <!-- Populated dynamically via popup.js -->
            </div>
          </section>
 
          <!-- Platforms Section -->
          <section class="section-container">
            <h2 class="section-title">Platforms</h2>
            <div class="platforms-list">
              
              <!-- YouTube Row -->
              <div class="platform-row" id="row-youtube" data-platform="youtube">
                <div class="platform-icon">

                <label class="switch">
                  <input type="checkbox" class="platform-master-toggle" id="toggle-youtube" data-platform="youtube" checked>
                  <span class="slider"></span>
                </label>
                <button class="btn-platform-settings" id="settings-youtube" data-platform="youtube" aria-label="Customize YouTube blocking">

          <!-- Custom Sites Section -->

      <!-- VIEW 2: DETAIL VIEW -->
      <div class="view-panel" id="view-detail">
        <div class="container">
          <!-- Detail Header -->
          <div class="detail-header-row">
            <button class="btn-back" id="btn-back-to-main" aria-label="Go back">
              <span class="back-arrow">←</span>
              <span class="back-text">Back to Platforms</span>
            </button>
            <div class="detail-header-title">
              <div id="detail-platform-icon"></div>
              <span id="detail-platform-name">Platform</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="detail-platform-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>

          <div class="separator-line"></div>

          <!-- Options Container -->
          <div class="detail-options-container">
            <h3 class="detail-section-title" id="detail-options-title">What to Block</h3>
            <div class="checkbox-list" id="detail-checkboxes-list">
              <!-- Checkboxes will be dynamically rendered here depending on the clicked platform -->
            </div>
            <div class="detail-actions-footer" id="detail-actions-footer">
              <!-- Block Full Site button dynamically rendered here -->
            </div>
          </div>
          
          <!-- Support Section -->
          <section class="support-section">
            <hr class="separator">
